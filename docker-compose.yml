services:
  redis:
    image: redis:7-alpine
    container_name: jewellery-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./jewellery-backend
    container_name: jewellery-backend
    ports:
      - "8090:8090"
    environment:
      DB_USERNAME: ${DB_USERNAME:-jewellery_app}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in a .env file next to this compose file}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in a .env file next to this compose file (32+ chars)}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:postgresql://192.168.100.142:5432/jewellery_store}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./jewellery-frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8090/api/v1}
    container_name: jewellery-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-data:
