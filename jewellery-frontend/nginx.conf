server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Cache hashed build assets aggressively; never cache index.html itself so
    # deploys are picked up immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: any unmatched path (e.g. /products/some-slug on a hard
    # refresh) resolves to index.html so React Router can take over client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
